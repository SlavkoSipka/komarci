[build]
  # Build command - install ALL dependencies (including dev) and build
  command = "npm ci && npm run build"
  
  # Publish directory - where the built files are
  publish = "dist"

# Environment variables
[build.environment]
  NODE_VERSION = "20"

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
