[build]
  # Build command - install ALL dependencies (including dev) and build
  command = "npm ci && npm run build"
  
  # Publish directory - where the built files are
  publish = "dist"

# Environment variables
[build.environment]
  NODE_VERSION = "20"

# Redirect rules - Fix duplicate URLs (without .html to with .html)
[[redirects]]
  from = "/komarnici"
  to = "/komarnici.html"
  status = 301
  force = true

[[redirects]]
  from = "/harmonika-vrata"
  to = "/harmonika-vrata.html"
  status = 301
  force = true

[[redirects]]
  from = "/zavese"
  to = "/zavese.html"
  status = 301
  force = true

[[redirects]]
  from = "/kontakt"
  to = "/kontakt.html"
  status = 301
  force = true

[[redirects]]
  from = "/galerija"
  to = "/galerija.html"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301
  force = true

[[redirects]]
  from = "/autor"
  to = "/autor.html"
  status = 301
  force = true


# Block nested image paths - redirect to 404
[[redirects]]
  from = "/images/images/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/images/js/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/images/css/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/js/images/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/css/images/*"
  to = "/404.html"
  status = 404
  force = true

# Catch-all for SPA (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
