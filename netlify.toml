[build]
  # Build command - run the full build
  command = "npm run build"
  
  # Publish directory - where the built files are
  publish = "dist"
  
  # Node version
  environment = { NODE_VERSION = "18" }

# Cache node_modules between builds
[build.environment]
  NODE_ENV = "production"

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
