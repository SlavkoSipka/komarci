[build]
  # Build command - run the full build
  command = "npm run build"
  
  # Publish directory - where the built files are
  publish = "dist"

# Environment variables
[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
